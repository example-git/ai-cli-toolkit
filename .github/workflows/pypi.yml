name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.1). If omitted, uses tag version."
        required: false
        type: string

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/ai-cli-toolkit

    permissions:
      id-token: write   # mandatory for PyPI trusted publishing
      contents: write   # (optional) if you later add release creation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Resolve version (tag or workflow_dispatch input)
        id: versioning
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            echo "workflow_dispatch detected; using input version: $VERSION"
          else
            if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
              echo "Ref is not a v* tag. Ref: ${GITHUB_REF}"
              echo "This workflow only publishes from v* tags (or workflow_dispatch with an explicit version)."
              exit 1
            fi
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            echo "Tag detected; using version: $VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Preflight - skip if version already exists on PyPI
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.versioning.outputs.version }}"

          python - "$VERSION" <<'PY'
          import json
          import sys
          import urllib.request
          import urllib.error

          version = sys.argv[1]
          url = "https://pypi.org/pypi/ai-cli-toolkit/json"

          try:
            with urllib.request.urlopen(url, timeout=20) as r:
              data = json.load(r)
          except urllib.error.HTTPError as e:
            # If the project doesn't exist yet, proceed with publish.
            if e.code == 404:
              print("PyPI project not found yet; proceeding.")
              sys.exit(0)
            raise

          releases = data.get("releases", {})
          if version in releases and releases[version]:
            print(f"Version {version} already exists on PyPI; skipping publish.")
            sys.exit(0)

          print(f"Version {version} not present on PyPI; proceeding.")
          PY

      - name: Build a binary wheel and a source tarball
        run: python -m build

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
