name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.1). If omitted, uses tag version."
        required: false
        type: string

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/ai-cli-toolkit

    permissions:
      id-token: write   # mandatory for PyPI trusted publishing
      contents: write   # needed for GitHub Release creation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Resolve version (tag or workflow_dispatch input)
        id: versioning
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            echo "workflow_dispatch detected; using input version: $VERSION"
          else
            if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
              echo "Ref is not a v* tag. Ref: ${GITHUB_REF}"
              echo "This workflow only publishes from v* tags (or workflow_dispatch with an explicit version)."
              exit 1
            fi
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            echo "Tag detected; using version: $VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Stamp version into pyproject.toml
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.versioning.outputs.version }}"
          echo "Setting version to $VERSION in pyproject.toml"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          echo "--- pyproject.toml (version line) ---"
          grep '^version' pyproject.toml

      - name: Preflight - skip if version already exists on PyPI
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.versioning.outputs.version }}"

          SKIP=$(python - "$VERSION" <<'PY'
          import json, sys, urllib.request, urllib.error

          version = sys.argv[1]
          url = "https://pypi.org/pypi/ai-cli-toolkit/json"

          try:
            with urllib.request.urlopen(url, timeout=20) as r:
              data = json.load(r)
          except urllib.error.HTTPError as e:
            if e.code == 404:
              print("false")
              sys.exit(0)
            raise

          releases = data.get("releases", {})
          if version in releases and releases[version]:
            print("true")
          else:
            print("false")
          PY
          )

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [[ "$SKIP" == "true" ]]; then
            echo "⚠️  Version $VERSION already exists on PyPI; will skip publish."
          else
            echo "✅ Version $VERSION not on PyPI; proceeding."
          fi

      - name: Build a binary wheel and a source tarball
        if: steps.preflight.outputs.skip != 'true'
        run: python -m build

      - name: Create GitHub Release
        if: steps.preflight.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.versioning.outputs.version }}"
          name: "v${{ steps.versioning.outputs.version }}"
          body: "Release v${{ steps.versioning.outputs.version }}"
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish distribution to PyPI
        if: steps.preflight.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
