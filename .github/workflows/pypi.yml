name: Publish to PyPI

on:
  release:
    types: [published]
  # Alternatively, you can trigger on pushes to the main branch with tags:
  # push:
  #   tags:
  #     - 'v*'

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # Specifying an environment is required for PyPI Trusted Publishing
    environment:
      name: pypi
      url: https://pypi.org/p/ai-cli-toolkit # Replace with your actual PyPI package name
      
    permissions:
      id-token: write  # IMPORTANT: mandatory for PyPI trusted publishing
      contents: read   # mandatory for checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build a binary wheel and a source tarball
        run: python -m build

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
