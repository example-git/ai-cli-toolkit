name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/ai-cli-toolkit

    permissions:
      id-token: write   # mandatory for PyPI trusted publishing
      contents: write   # needed to create GitHub Releases on tag pushes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to read tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build tomli tomli-w

      - name: Resolve version and update pyproject.toml
        id: versioning
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF#refs/tags/}"          # e.g. v1.2.3  (or the full ref if not a tag)
          IS_TAG_RELEASE=false

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            IS_TAG_RELEASE=true
            VERSION="${TAG#v}"                    # strip leading 'v'
            echo "Tagged release detected: $VERSION"
          else
            # Read current version from pyproject.toml and bump patch by 1
            CURRENT=$(python - <<'PY'
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )
            echo "Current version in pyproject.toml: $CURRENT"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "Bumped version: $VERSION"
          fi

          # Write the resolved version back to pyproject.toml
          python - "$VERSION" <<'PY'
          import sys
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          import tomli_w

          version = sys.argv[1]
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          data["project"]["version"] = version
          with open("pyproject.toml", "wb") as f:
              tomli_w.dump(data, f)
          print(f"pyproject.toml updated to version {version}")
          PY

          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "IS_TAG_RELEASE=$IS_TAG_RELEASE" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_tag_release=$IS_TAG_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Build a binary wheel and a source tarball
        run: python -m build

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release (tagged versions only)
        if: steps.versioning.outputs.is_tag_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release v${{ steps.versioning.outputs.version }}
          generate_release_notes: true
          files: dist/*
